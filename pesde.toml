name = "story_bakery/bakery_vide_kit"
version = "0.1.0"
license = "MIT"
includes = ["pesde.toml", "LICENSE", "README.md", ".pesde/scripts/roblox_sync_config_generator.luau", ".pesde/scripts/sourcemap_generator.luau", "src/**/*.luau", "src/**/*.json", "tests/**/*.luau"]

[target]
environment = "roblox"
lib = "src/init.luau"
build_files = [
    "src",
]

[indices]
default = "https://github.com/pesde-pkg/index"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[dependencies]
TableUtil = { repo = "Story-Bakery/TableUtil", rev = "main" }
MathUtil = { repo = "Story-Bakery/MathUtil", rev = "main" }
DynamicTimer = { repo = "Story-Bakery/DynamicTimer", rev = "main" }
DynamicTween = { repo = "Story-Bakery/DynamicTween", rev = "main" }
LinearInterpolation = { repo = "Story-Bakery/LinearInterpolation", rev = "main" }
UserInputManager = { repo = "Story-Bakery/UserInputManager", rev = "main" }
ExtendedTranslator = { repo = "Story-Bakery/ExtendedTranslator", rev = "main" }
Maid = { repo = "Story-Bakery/Maid", rev = "main" }
vide = { name = "centau/vide", version = "^0.3.1-test.1" }
ui-labs = { wally = "pepeeltoro41/ui-labs", version = "^2.4.2" }

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"
